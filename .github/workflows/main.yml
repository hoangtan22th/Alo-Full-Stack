name: CI_CD_Pipeline

on:
  push:
    branches: [ main ]

concurrency:
  group: production
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true 

jobs:

  # 1. BUILD + PUSH IMAGES FOR ALL MICROSERVICES (RUNS IN PARALLEL VIA MATRIX)
  build:
    name: Build & Push ${{ matrix.service.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - name: discovery-service
            file: infrastructure/discovery-service/Dockerfile
            image: alo-discovery-service
          - name: api-gateway
            file: infrastructure/api-gateway/Dockerfile
            image: alo-api-gateway
          - name: auth-service
            file: Backend/auth-service/Dockerfile
            image: alo-auth-service
          - name: user-service
            file: Backend/user-service/Dockerfile
            image: alo-user-service
          - name: contact-service
            file: Backend/contact-service/Dockerfile
            image: alo-contact-service
          - name: notification-service
            file: Backend/notification-service/Dockerfile
            image: alo-notification-service
          - name: chatbot-service
            file: Backend/chatbot-service/Dockerfile
            image: alo-chatbot-service
          - name: report-service
            file: Backend/report-service/Dockerfile
            image: alo-report-service
          - name: message-service
            file: Backend/message-service/Dockerfile
            image: alo-message-service
          - name: group-service
            file: Backend/group-service/Dockerfile
            image: alo-group-service
          - name: realtime-service
            file: Backend/realtime-service/Dockerfile
            image: alo-realtime-service
          - name: voting-service
            file: Backend/voting-service/Dockerfile
            image: alo-voting-service
          - name: alo-chat-2
            file: Web/alo-chat-2/Dockerfile
            image: alo-chat-web
          - name: alo-chat-admin
            file: Web/alo-chat-admin/Dockerfile
            image: alo-chat-admin

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0 # Fetch all history for all tags and branches (needed for git diff)

      - name: Check for changes in service directory
        id: check_changes
        run: |
          DIR=$(dirname "${{ matrix.service.file }}")
          echo "Checking changes in directory: $DIR"
          
          # Default to true (build by default)
          CHANGED=true
          
          # Check if this is a push event with before/after commits
          if [ "${{ github.event.before }}" != "0000000000000000000000000000000000000000" ] && [ -n "${{ github.event.before }}" ]; then
            echo "Comparing changes between ${{ github.event.before }} and ${{ github.event.after }}"
            
            # Check if service folder changed
            if git diff --quiet ${{ github.event.before }} ${{ github.event.after }} -- "$DIR"; then
              CHANGED=false
              echo "No changes detected in $DIR."
            else
              echo "Changes detected in $DIR!"
            fi
            
            # SPECIAL RULE: If this is a Java service and common-service has changed, force build
            if [ "$CHANGED" = "false" ] && [[ "${{ matrix.service.file }}" == Backend/* ]] && [[ "${{ matrix.service.file }}" != *message-service* ]] && [[ "${{ matrix.service.file }}" != *group-service* ]] && [[ "${{ matrix.service.file }}" != *realtime-service* ]] && [[ "${{ matrix.service.file }}" != *voting-service* ]]; then
              if ! git diff --quiet ${{ github.event.before }} ${{ github.event.after }} -- "Backend/common-service"; then
                echo "Backend/common-service changed! Forcing build for Java service ${{ matrix.service.name }}."
                CHANGED=true
              fi
            fi
          else
            # Fallback to checking HEAD~1 if git history allows
            if git rev-parse --verify HEAD~1 >/dev/null 2>&1; then
              echo "Comparing changes in the last commit (HEAD~1 to HEAD)"
              if git diff --quiet HEAD~1 HEAD -- "$DIR"; then
                CHANGED=false
                echo "No changes detected in $DIR."
              else
                echo "Changes detected in $DIR!"
              fi
              
              # SPECIAL RULE for common-service fallback
              if [ "$CHANGED" = "false" ] && [[ "${{ matrix.service.file }}" == Backend/* ]] && [[ "${{ matrix.service.file }}" != *message-service* ]] && [[ "${{ matrix.service.file }}" != *group-service* ]] && [[ "${{ matrix.service.file }}" != *realtime-service* ]] && [[ "${{ matrix.service.file }}" != *voting-service* ]]; then
                if ! git diff --quiet HEAD~1 HEAD -- "Backend/common-service"; then
                  echo "Backend/common-service changed! Forcing build for Java service ${{ matrix.service.name }}."
                  CHANGED=true
                fi
              fi
            else
              echo "First push or no historical commit found. Forcing full build."
            fi
          fi
          
          echo "changed=$CHANGED" >> $GITHUB_OUTPUT
        shell: bash

      - name: Set up Docker Buildx
        if: steps.check_changes.outputs.changed == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        if: steps.check_changes.outputs.changed == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build & Push
        if: steps.check_changes.outputs.changed == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.service.file }}
          push: true
          tags: |
            docker.io/${{ secrets.DOCKER_USERNAME }}/${{ matrix.service.image }}:${{ github.sha }}
            docker.io/${{ secrets.DOCKER_USERNAME }}/${{ matrix.service.image }}:latest
