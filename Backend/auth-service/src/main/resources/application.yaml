server:
  port: 8080
  servlet:
    context-path: /auth-service

spring:
  application:
    name: auth-service

  datasource:
    url: jdbc:mariadb://localhost:3306/alo_auth_db?createDatabaseIfNotExist=true&useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Ho_Chi_Minh
    username: root
    password: root

    driver-class-name: org.mariadb.jdbc.Driver

  jpa:
    hibernate:
      # QUAN TRỌNG: Đổi từ update sang none để Hibernate không gửi lệnh ALTER lỗi vào MariaDB 5.5
      # Bạn đã tạo bảng bằng script SQL thủ công nên để 'none' hoặc 'validate' là an toàn nhất.
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        # Ép Hibernate sử dụng đúng phương ngữ cho MariaDB đời cũ để tránh lỗi cú pháp
        dialect: org.hibernate.dialect.MariaDBDialect
        format_sql: true

  data:
    redis:
      host: localhost
      port: 6379

  rabbitmq:
    host: localhost
    port: 5672

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_DEFAULT_ZONE:http://localhost:8761/eureka/}
    # Tạm thời tắt nếu bạn chưa chạy Eureka Server để tránh log lỗi liên tục
    enabled: true
  instance:
    prefer-ip-address: true

# Cấu hình JWT Custom
jwt:
  secret: "your_very_long_and_very_secure_secret_key_zalo_clone_2026_edu_iuh_fit"

# Cấu hình Swagger UI
springdoc:
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: alpha
  api-docs:
    path: /v3/api-docs

logging:
  level:
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE