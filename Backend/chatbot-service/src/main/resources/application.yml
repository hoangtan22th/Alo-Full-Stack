server:
  port: 8085

spring:
  datasource:
    url: jdbc:mariadb://localhost:3306/chatbot_memory?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Ho_Chi_Minh
    username: root
    password: root
    driver-class-name: org.mariadb.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MariaDBDialect
        format_sql: true

  ai:
    openai:
      api-key: ${GEMINI_API_KEY}
      chat:
        base-url: https://generativelanguage.googleapis.com/v1beta/openai/
        options:
          model: gemini-2.5-flash
          temperature: 0.2
          max-tokens: 1000               # ✅ QUAN TRỌNG: chặn output quá dài
          top-p: 0.9                   # giảm random nhẹ
          # 👉 cái này giúp AI không lan man
          stop: ["\n\n"]

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_DEFAULT_ZONE:http://localhost:8761/eureka/}
  instance:
    prefer-ip-address: true